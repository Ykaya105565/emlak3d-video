version: "3.9"

services:
  # ── Altyapı ──────────────────────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emlak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emlak_pass}
      POSTGRES_DB: ${POSTGRES_DB:-emlakdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emlak}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web konsol
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket'larını otomatik oluştur
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb --ignore-existing local/${MINIO_BUCKET_GML:-gml-files};
        mc mb --ignore-existing local/${MINIO_BUCKET_PHOTOS:-property-photos};
        mc mb --ignore-existing local/${MINIO_BUCKET_VIDEOS:-rendered-videos};
        echo 'MinIO buckets ready';
      "

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-emlak}:${POSTGRES_PASSWORD:-emlak_pass}@db:5432/${POSTGRES_DB:-emlakdb}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ./backend:/app
      - ./data:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Celery Worker (render kuyruğu) ─────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-emlak}:${POSTGRES_PASSWORD:-emlak_pass}@db:5432/${POSTGRES_DB:-emlakdb}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      RENDER_WORKER_URL: http://render-worker:8001
    volumes:
      - ./backend:/app
      - ./data:/data
      - render-tmp:/tmp/renders
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      render-worker:
        condition: service_started
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2 -Q render,default

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-emlak}:${POSTGRES_PASSWORD:-emlak_pass}@db:5432/${POSTGRES_DB:-emlakdb}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - celery-worker
    command: celery -A app.core.celery_app beat --loglevel=info

  # ── Render Worker (Node.js — Remotion + three.js) ─────────────────────
  render-worker:
    build:
      context: ./render
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      BACKEND_URL: http://backend:8000
      RENDER_OUTPUT_DIR: /tmp/renders
    volumes:
      - ./render:/app
      - ./data:/data
      - render-tmp:/tmp/renders
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    # GPU desteği için: runtime: nvidia (prod ortamında aktifleştir)

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      VITE_CESIUM_ION_TOKEN: ${CESIUM_ION_TOKEN}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  pgdata:
  miniodata:
  render-tmp:
